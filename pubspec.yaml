name: empyrealkeys
description: "A simple piano app."
# The following line prevents the package from being accidentally published to
# pub.dev using `flutter pub publish`. This is preferred for private packages.
publish_to: 'none' # Remove this line if you wish to publish to pub.dev
version: 2.2.1+10

environment:
  sdk: ^3.6.0

dependencies:
  flutter:
    sdk: flutter

  # The following adds the Cupertino Icons font to your application.
  # Use with the CupertinoIcons class for iOS style icons.
  cupertino_icons: ^1.0.8
  provider: ^6.1.2
#  flutter_midi_pro: ^3.1.4
  dio: ^5.7.0
  firebase_storage: ^12.4.0
  firebase_app_check: ^0.3.2
  iconify_flutter: ^0.0.7
  interactive_slider: ^0.5.0
  device_info_plus: ^11.2.1
  firebase_core: ^3.10.0
  path_provider: ^2.1.5
  change_app_package_name: ^1.1.0
  package_info_plus: ^8.2.1
  knob_widget: ^1.0.3
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  connectivity_plus: ^6.1.4
  audioplayers: ^6.5.1
  flutter_midi_16kb: ^0.0.2
  file_picker: ^10.3.3
  flutter_music_notation:
    path: ../flutter_music_notation

dev_dependencies:
  hive_generator: ^2.0.1
  build_runner: 2.4.13
  flutter_test:
    sdk: flutter

  # The "flutter_lints" package below contains a set of recommended lints to
  # encourage good coding practices. The lint set provided by the package is
  # activated in the `analysis_options.yaml` file located at the root of your
  # package. See that file for information about deactivating specific lint
  # rules and activating additional ones.
  flutter_lints: ^5.0.0
  flutter_launcher_icons: ^0.14.2

flutter_launcher_icons:
  android: true
  image_path_android: "assets/images/logo_color.png"
  min_sdk_android: 25 # android min sdk min:16, default 21
  adaptive_icon_background: "#ffffff"
  adaptive_icon_foreground: "assets/images/logo_color.png"
  web:
    generate: true
    image_path: "assets/images/logo_color.png"
    background_color: "#000000"
    theme_color: "#ffffff"

# For information on the generic Dart part of this file, see the
# following page: https://dart.dev/tools/pub/pubspec

# The following section is specific to Flutter packages.
flutter:

  # The following line ensures that the Material Icons font is
  # included with your application, so that you can use the icons in
  # the material Icons class.
  uses-material-design: true

  # To add assets to your application, add an assets section, like this:
  # assets:
  #   - images/a_dot_burr.jpeg
  #   - images/a_dot_ham.jpeg
  assets:
    - assets/midi/easy/
    - assets/midi/intermediate/
    - assets/midi/pro/
    - assets/sounds/soundfonts/
    - assets/sounds/metronome/metronome_click_strong.wav
    - assets/sounds/metronome/metronome_click_soft.wav
    - assets/sounds/metronome/metronome_woodblock_soft.wav
    - assets/sounds/metronome/metronome_woodblock_strong.wav
    - assets/images/

  fonts:
    - family: AtomicClockRadio
      fonts:
        - asset: assets/fonts/ATOMICCLOCKRADIO.TTF
